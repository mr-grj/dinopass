# Development overlay
name: dinopass-dev

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 80 --reload"
    ports: !override
      - "8100:80"
    environment:
      CORS_ORIGINS: '["http://localhost:3100"]'
    volumes:
      - ./backend:/app/src

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    ports: !override
      - "3100:3100"
    environment:
      VITE_API_URL: http://localhost:8100/api
      VITE_PORT: "3100"
      VITE_USE_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
