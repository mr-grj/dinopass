services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 80 --reload"
    volumes:
      - ./backend:/app/src

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_USE_POLLING: "true"
    volumes:
      # Mount the whole frontend for HMR (index.html and vite.config.js live at
      # the root), but keep the container's node_modules (native binaries differ).
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
